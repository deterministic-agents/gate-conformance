# GATE Conformance Report  -  Template
# Version: 1.1
# Fill this out for each environment and autonomy tier you operate.
# Submit as part of architecture review, audit, or change control.

report:
  generated_at: "YYYY-MM-DDTHH:MM:SSZ"
  generated_by: ""          # Name/team
  gate_version: "1.3"
  report_version: "1.1"
  environment: ""           # dev | test | prod
  autonomy_tier: ""         # sandbox | bounded | high_privilege
  assessment_period:
