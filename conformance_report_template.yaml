metrics:
  # Operational metrics supporting conformance claims.
  # Collect from your observability pipeline.
  tool_calls_without_policy_decision_record: 0   # Target: 0
  bypass_detections:                           0   # Target: 0
  attestation_coverage_pct:                    0   # Target: 100
  ledger_integrity_status:                    ""   # PASS | FAIL
  replay_success_rate_pct:                     0   # Target: >= 95
  breaker_containment_slo_met_pct:             0   # Target: >= 99
  high_impact_signature_coverage_pct:          0   # Target: 100
  hitl_required_without_approval:             0   # Target: 0
  cross_tenant_memory_violations:              0   # Target: 0

retention_profile:
